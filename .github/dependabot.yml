# Automated dependency-update PRs (audit 2026-07-14: the repo had no
# supply-chain automation). Weekly, grouped, so a CVE fix or a floating-dep
# bump arrives as a reviewable PR rather than a silent latest-resolve.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/host-python"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/phone-app"
    schedule:
      interval: "weekly"
    groups:
      phone-deps:
        patterns: ["*"]
        # Majors stay OUT of the group: the first grouped run proposed an
        # entire Expo SDK 54→57 platform migration (RN, React, TS 7, jest 30,
        # zustand 5) as one unreviewable, CI-red PR (#334). Minors/patches
        # flow automatically; majors arrive as individual PRs — except the
        # Expo-coupled platform set below, which only moves together via a
        # deliberate `npx expo install` SDK migration.
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest-expo"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      web-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
