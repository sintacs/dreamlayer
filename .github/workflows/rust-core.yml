name: rust-core

# The reality-core PoC (ADR 0003): the Figment safety caps as one Rust core,
# proven bit-identical to the Python reference. This job keeps that proof honest
# — it builds the crate, runs the Rust unit tests, then runs the cross-language
# parity test that drives the compiled cdylib against contracts.py.
#
# Path-filtered: only runs when the crate or the parity test changes, so it does
# not burden every push. GitHub's ubuntu runners ship a Rust toolchain, so no
# install step is needed.

on:
  push:
    paths:
      - "reality-core/**"
      - "host-python/src/dreamlayer/tests/test_reality_core_parity.py"
      - "host-python/src/dreamlayer/tests/test_reality_core_wasm_parity.py"
      - "landing/assets/lens/figment.js"
      - ".github/workflows/rust-core.yml"
  pull_request:
    paths:
      - "reality-core/**"
      - "host-python/src/dreamlayer/tests/test_reality_core_parity.py"
      - "host-python/src/dreamlayer/tests/test_reality_core_wasm_parity.py"
      - "landing/assets/lens/figment.js"
  workflow_dispatch:

jobs:
  rust-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build the core + run Rust unit tests
        working-directory: reality-core
        run: |
          cargo --version
          cargo build --release
          cargo test

      - name: Build the wasm target + run the JS parity harness
        working-directory: reality-core
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build --release --target wasm32-unknown-unknown
          node --version
          node parity/wasm_parity.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the package
        working-directory: host-python
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Cross-language parity — Rust core vs Python and vs JS (wasm)
        working-directory: host-python
        run: >
          pytest -q
          src/dreamlayer/tests/test_reality_core_parity.py
          src/dreamlayer/tests/test_reality_core_wasm_parity.py
