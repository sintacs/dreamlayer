# Build smoke for the marketing site: typecheck + Vite build must succeed.
# (The Playwright screenshot e2e stays a local/deploy-time tool — this gate
# is about a contributor not being able to break the build with a green
# check.)
name: web

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
