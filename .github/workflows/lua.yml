# The device Lua gets a native lint gate (halo-lua/.luacheckrc): no
# undefined globals beyond the device runtime's, no shadowing, no syntax
# drift. Behavior is still covered by the lupa raster harness in pytest;
# this catches what only a Lua-aware tool sees.
name: lua

on:
  push:
    branches: [main]
    paths: ["halo-lua/**", ".github/workflows/lua.yml"]
  pull_request:
    paths: ["halo-lua/**", ".github/workflows/lua.yml"]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check
      - name: Lint the device Lua
        working-directory: halo-lua
        run: luacheck . --no-color

  # selene is the actively-maintained (Rust) Lua linter; luacheck's last release
  # was 2018. It runs as a second gate with the same std (halo-lua/dreamlayer.yml
  # + selene.toml). Informational to start (continue-on-error) so a first run
  # can't break main before the config is confirmed clean on the real binary;
  # flip to blocking once green.
  #
  # Known drift (observed 2026-07): `cargo install selene` now pulls a version
  # that errors with "lua version lua52 in standard library, but feature for it
  # is not enabled" against our dreamlayer.yml std — a binary-vs-config version
  # mismatch, not a lint finding. Before flipping this job to blocking, pin the
  # selene version here (cargo install selene --version <known-good> --locked)
  # or migrate dreamlayer.yml to the std format the new binary expects.
  selene:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install selene
        run: cargo install selene --locked
      - name: Lint the device Lua (selene)
        working-directory: halo-lua
        run: selene .
