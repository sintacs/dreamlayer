# CONTRIBUTING.md mandates DCO sign-off (git commit -s); until now nothing
# enforced it. External PRs are checked here; pushes by the maintainer's own
# automation are exempt (the job only runs on pull_request), matching the
# OPEN_SOURCE.md note about not blocking maintainer automation.
name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every PR commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list "$BASE".."$HEAD" --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: '; then
              echo "::error::commit $sha is missing a Signed-off-by trailer (git commit -s)"
              missing=1
            fi
          done
          exit $missing
