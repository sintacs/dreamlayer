[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "memoscape"
version = "0.1.0"
description = "Memory engine for Brilliant Labs Halo glasses"
requires-python = ">=3.11"
dependencies = [
    "Pillow>=10",
    "numpy>=1.26",
    "openai>=1.30",
]

[project.optional-dependencies]
# lupa runs the halo-lua test suites (pinned to lupa.lua53 = device Lua)
dev      = ["pytest>=8", "pytest-asyncio>=0.23", "lupa>=2.0"]
hardware = ["brilliant-ble", "brilliant-msg"]
dream    = ["brilliant-msg", "Pillow>=10"]   # pip install memoscape[dream]

[tool.pytest.ini_options]
testpaths = ["src/memoscape/tests", "src/dreamlayer/tests"]
